<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto & AI Image Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Teachable Machine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="tab-nav">
            <button class="tab-btn active" onclick="openTab(event, 'lotto-tab')">Lotto Flash</button>
            <button class="tab-btn" onclick="openTab(event, 'teachable-machine-tab')">AI Image Model</button>
        </div>

        <!-- Lotto Tab -->
        <div id="lotto-tab" class="tab-content active">
            <h1 class="title">Lotto Flash</h1>
            <div class="numbers-wrapper"></div>
            <button id="generate-btn" class="glow-on-hover" onclick="generateNumbers()">Generate Lucky Numbers</button>
        </div>

        <!-- AI Model Tab -->
        <div id="teachable-machine-tab" class="tab-content">
            <h1 class="title">AI Analyzer</h1>
            <div class="ai-model-container">
                <div class="model-info">Upload an image to see the AI classification results</div>
                <div class="ai-controls">
                    <label for="image-upload" class="glow-on-hover upload-btn">
                        Select & Upload Image
                        <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)" style="display: none;">
                    </label>
                </div>
                <div id="webcam-container">
                    <div class="placeholder-text">Your image will appear here</div>
                </div>
                <!-- 결과 게이지가 나타날 곳 -->
                <div id="label-container"></div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
